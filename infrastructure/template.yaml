AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Job Search Automation — Lambda + EventBridge + DynamoDB

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 512
    Timeout: 300  # 5 minutes

Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────
  JobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: jobs
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  EvaluationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: evaluations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: eval_id
          AttributeType: S
      KeySchema:
        - AttributeName: eval_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── IAM Role ──────────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: JobSearchLambdaRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: JobSearchPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt JobsTable.Arn
                  - !GetAtt EvaluationsTable.Arn
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/jobsearch/*

  # ── Lambda ────────────────────────────────────────────────────────────────
  JobSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: job-search-automation
      CodeUri: ../
      Handler: src.handler.main
      Role: !GetAtt LambdaExecutionRole.Arn
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref JobsTable
          EVALUATIONS_TABLE: !Ref EvaluationsTable
      Events:
        ScheduledPoll:
          Type: ScheduleV2
          Properties:
            Name: job-search-every-10-min
            ScheduleExpression: rate(10 minutes)
            RetryPolicy:
              MaximumRetryAttempts: 2
              MaximumEventAgeInSeconds: 300

  # ── CloudWatch Logs ───────────────────────────────────────────────────────
  JobSearchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/job-search-automation
      RetentionInDays: 30

Outputs:
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt JobSearchFunction.Arn
  TableName:
    Description: DynamoDB table name
    Value: !Ref JobsTable
